version: 1
common:
  appLogDestination: console
  resourcesPath: ./resources
  enableAppHealthCheck: false
  logLevel: info
apps:
  - appID: durable-agent-service
    appDirPath: ./
    appPort: 8001
    appProtocol: http
    daprHTTPPort: 3500
    command: ["uv", "run", "durable_agent_service.py"]
